# =============================================================================
# TechGloMed — Docker Compose (Local Development)
#
# Services:
#   api        — NestJS application (hot-reload via volume mount)
#   postgres   — PostgreSQL 16
#   redis      — Redis 7
#   adminer    — Lightweight DB UI (dev only)
#   redis-ui   — Redis Commander UI (dev only)
#
# Usage:
#   docker compose up -d            # start all services
#   docker compose logs -f api      # tail API logs
#   docker compose down -v          # stop and remove volumes
# =============================================================================

version: '3.9'

services:

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps          # use deps stage in dev (has devDeps for ts-node)
    container_name: techglommed_api
    command: npm run start:dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}?schema=public
      REDIS_HOST: redis
    ports:
      - '${APP_PORT:-3000}:3000'
      - '9229:9229'         # Node.js debugger port
    volumes:
      - ./src:/app/src:ro           # mount source for hot-reload (read-only)
      - ./prisma:/app/prisma:ro     # mount Prisma schema
      - /app/node_modules           # anonymous volume to preserve container node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - techglommed_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: techglommed_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - techglommed_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: techglommed_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - techglommed_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer (DB UI) — dev only ───────────────────────────────────────────────
  adminer:
    image: adminer:4-standalone
    container_name: techglommed_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: flat
    depends_on:
      - postgres
    networks:
      - techglommed_net
    profiles:
      - tools   # only starts with: docker compose --profile tools up

  # ── Redis Commander (Redis UI) — dev only ────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: techglommed_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: 'local:redis:6379:0:${REDIS_PASSWORD:-}'
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - techglommed_net
    profiles:
      - tools

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  techglommed_net:
    driver: bridge
